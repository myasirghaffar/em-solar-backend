# Cloudflare Workers — set secrets with: wrangler secret put JWT_ACCESS_SECRET (etc.)
# Postgres: use Hyperdrive in production (recommended) or DATABASE_URL for Neon/Supabase pooler.
# See: https://developers.cloudflare.com/hyperdrive/
#
# If API fetch() from the browser gets 302 → cloudflareaccess.com/login: Zero Trust (Access) is
# protecting this hostname. Remove that app, or add a Bypass policy for public API paths — Access
# is separate from DATABASE_URL / JWT; it blocks requests before they reach the Worker.
#
# Do not add VITE_API_URL here — that is a frontend *build-time* variable (Vite). The API Worker
# never reads it. Set VITE_API_URL on the platform that runs `vite build` for em-solar (Pages, etc.).

name = "em-solar-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[vars]
JWT_ACCESS_EXPIRATION = "15m"
JWT_REFRESH_EXPIRATION = "7d"
# Comma-separated origins (exact match, no trailing slash). Add every frontend host that calls this API.
ALLOWED_ORIGINS = "http://localhost:5173,https://energymart-pk.vercel.app,https://em-solar.ghaffaryasir28.workers.dev"
# Shown on HTML status dashboard (/, /status). Override DEPLOYED_AT / GIT_* per deploy in dashboard or CI.
ENVIRONMENT = "production"
# Status page “Cloudflare Workers” card — bump when you change compatibility_date above.
WORKER_COMPAT_DATE = "2025-04-01"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "03968b8e83ee42ceb48cd26123a80f3d"
# Optional for local `wrangler dev` only:
# localConnectionString = "postgresql://user:pass@localhost:5432/postgres"
